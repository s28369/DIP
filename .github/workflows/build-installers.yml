name: Build Installers

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Installer (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn clean package -DskipTests -q

      - name: Prepare JavaFX modules & input
        shell: cmd
        run: |
          set M2=%USERPROFILE%\.m2\repository\org\openjfx
          set FX=21.0.1
          mkdir target\fx-mods
          mkdir target\app-input
          copy "%M2%\javafx-base\%FX%\javafx-base-%FX%-win.jar"       target\fx-mods\
          copy "%M2%\javafx-graphics\%FX%\javafx-graphics-%FX%-win.jar" target\fx-mods\
          copy "%M2%\javafx-controls\%FX%\javafx-controls-%FX%-win.jar" target\fx-mods\
          copy "%M2%\javafx-fxml\%FX%\javafx-fxml-%FX%-win.jar"         target\fx-mods\
          copy target\fleet-management-1.0-SNAPSHOT.jar target\app-input\

      - name: Create .msi installer with jpackage
        shell: cmd
        run: |
          jpackage ^
            --input target\app-input ^
            --name FleetManagement ^
            --main-jar fleet-management-1.0-SNAPSHOT.jar ^
            --main-class org.springframework.boot.loader.launch.JarLauncher ^
            --type msi ^
            --module-path target\fx-mods ^
            --add-modules javafx.controls,javafx.fxml,java.base,java.sql,java.naming,java.management,java.instrument,java.desktop,java.xml,java.logging,java.compiler,java.transaction.xa,java.security.jgss,java.security.sasl,java.prefs,java.scripting,jdk.unsupported,jdk.crypto.ec ^
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.reflect=ALL-UNNAMED --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.nio=ALL-UNNAMED --add-opens java.base/sun.nio.ch=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.util.concurrent=ALL-UNNAMED --add-opens java.base/java.net=ALL-UNNAMED --add-opens java.naming/javax.naming.spi=ALL-UNNAMED" ^
            --app-version 1.0 ^
            --win-shortcut ^
            --win-menu ^
            --win-console ^
            --win-dir-chooser ^
            --dest dist

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: FleetManagement-Windows
          path: dist/*.msi

  build-macos:
    name: macOS Installer (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn clean package -DskipTests -q

      - name: Prepare JavaFX modules & input
        run: |
          M2="$HOME/.m2/repository/org/openjfx"
          FX="21.0.1"
          C="mac-aarch64"
          mkdir -p target/fx-mods target/app-input
          cp "$M2/javafx-base/$FX/javafx-base-$FX-$C.jar"       target/fx-mods/
          cp "$M2/javafx-graphics/$FX/javafx-graphics-$FX-$C.jar" target/fx-mods/
          cp "$M2/javafx-controls/$FX/javafx-controls-$FX-$C.jar" target/fx-mods/
          cp "$M2/javafx-fxml/$FX/javafx-fxml-$FX-$C.jar"         target/fx-mods/
          cp target/fleet-management-1.0-SNAPSHOT.jar target/app-input/

      - name: Create .dmg installer with jpackage
        run: |
          jpackage \
            --input target/app-input \
            --name FleetManagement \
            --main-jar fleet-management-1.0-SNAPSHOT.jar \
            --main-class org.springframework.boot.loader.launch.JarLauncher \
            --type dmg \
            --module-path target/fx-mods \
            --add-modules javafx.controls,javafx.fxml,java.base,java.sql,java.naming,java.management,java.instrument,java.desktop,java.xml,java.logging,java.compiler,java.transaction.xa,java.security.jgss,java.security.sasl,java.prefs,java.scripting,jdk.unsupported,jdk.crypto.ec \
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.reflect=ALL-UNNAMED --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.nio=ALL-UNNAMED --add-opens java.base/sun.nio.ch=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.util.concurrent=ALL-UNNAMED --add-opens java.base/java.net=ALL-UNNAMED --add-opens java.naming/javax.naming.spi=ALL-UNNAMED" \
            --app-version 1.0 \
            --dest dist

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: FleetManagement-macOS
          path: dist/*.dmg
